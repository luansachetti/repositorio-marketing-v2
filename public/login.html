<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Repositório Marketing</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Repositório de Marketing</h1>

        <form id="formLogin">
            <input
             type="text"
             id="usuario"
             placeholder="Usuário"
             required
            >

            <input
             type="password"
             id="senha"
             placeholder="Senha"
             required
            >

            <button type="submit">Entrar</button>
        </form>

        <div id="mensagem"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
